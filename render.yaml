# Render Blueprint — deploys the Cority ESBD engine as a Docker web service.
# In Render: New → Blueprint → connect this repo → it reads this file.
#
# This is configured for the FREE tier (no credit card required):
#   * plan: free  -> 512 MB RAM, sleeps after ~15 min idle (≈1 min cold start).
#   * No persistent disk on free, so the workbook/attachments reset when the
#     service restarts. Run agents 1->2->3 in one session and download the
#     Excel right after — the data lives while the service is awake.
#   * 512 MB is tight for Chromium. Light keyword searches are fine; a heavy
#     Agent 3 run could hit out-of-memory. If that happens, either upgrade
#     (set `plan: starter` and add a `disk:` block — paid), or use a free host
#     with more RAM (see DEPLOY-FREE.md -> Hugging Face Spaces).
services:
  - type: web
    name: cority-esbd-engine
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon            # change to your nearest region if you like
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
